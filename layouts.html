<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #parent{
            height: 800px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            background-image: linear-gradient(to right,red, yellow);
        }
        #child1,#child2{
            height: 400px;
            width: 400px;
            border-radius: 50px;
            box-shadow: 10px 10px 10px black;
        }
        img{
            height: 400px;
            width: 400px;
            border-radius: 50px;
        }
        img:hover{
            border-radius: 50%;
        }
        #child1:hover{
            border-radius: 50%;
        }
        #child2:hover{
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="parent">
        <div id="child1">
            <img src="https://tse3.mm.bing.net/th/id/OIP.snymwgifBLLTpDPUbAGDXQHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" alt="">
        </div>
        <div id="child2">
            <img src="https://th.bing.com/th/id/R.9e1f827c9e9475acc6e69bffdd9a67ee?rik=KnpM1DRuYzxKMA&riu=http%3a%2f%2fassets.designhill.com%2fdesign-blog%2fwp-content%2fuploads%2f2025%2f03%2f1-5.jpg&ehk=XgaIMCGOJyRxcxErdIXd%2bsXAcSM5RnLvqLPaWEfZIj0%3d&risl=&pid=ImgRaw&r=0" alt="">
        </div>
    </div>
</body>
</html>
