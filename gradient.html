<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .flag{
            height: 400px;
            width:600px;
            border: 1px solid black;
            background-image: linear-gradient(yellow 50%,red 50%);    
        }
        .flag1{
            height: 400px;
            width: 600px;
            border: 1px solid black;
            background-image: radial-gradient(circle, red 20%, green 20%);
        }
        .flag2{
            height: 400px;
            width: 600px;
            border: 1px solid black;
            background-image: conic-gradient(pink, green, yellow,orange);
        }
    </style>
</head>
<body>
    <div class="flag"></div>
    <div class="flag1"></div>
    <div class="flag2"></div>
</body>
</html>
