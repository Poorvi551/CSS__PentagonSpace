<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            background-color: lightsteelblue;
            color:cornflowerblue
        }
        p{
            color:rgb(0,255,0)
        }
        li:first-child{
            color:rgba(0, 0,255, 0.3)
        }
        li:nth-child(2){
            color:hsl(300deg, 50%, 45%)
        }
        li:nth-child(3){
            color:hsla(0deg, 80%, 50%, 0.3)
        }
        li:nth-child(4){
            color:rgba(0, 42, 255, 0.348)
        }
        li:nth-child(5){
            color: #ff00803b;
        }
        li:last-child{
            color:#ff509070
        }
    </style>
</head>
<body>
    <center>
    <h1>Colors in CSS</h1>
    </center>
    <p>They are of 5 types</p>
    <ul>
        <li>Colors Names:<i>red</i></li>
        <li>rgb:<i>rgb(255,0,0)-(red,green,blue)</i></li>
        <li>rgba:<i>rgba(255,0,0,0.5)-(red,green,blue,alpha)</i></li>
        <li>hsl:<i>hsl(0,100%,50%)-(hue,saturation,lightness)</i></li>
        <li>hsla:<i>hsla(0,100%,50%,0.5)-(hue,saturation,lightness,alpha)</i></li>
        <li>hexadecimal code:<i>#f00/#ff0000</i></li>
    </ul>
</body>
</html>
